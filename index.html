<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>運行管理</title>

<style>
body{font-family:sans-serif;margin:0;padding:0;background:#f5f5f5;}
.screen{display:none;padding:20px;}
.active{display:block;}
.card{
  background:#fff;
  padding:20px;
  margin-bottom:15px;
  border-radius:10px;
  box-shadow:0 2px 6px rgba(0,0,0,0.1);
}
button{
  padding:12px;
  font-size:16px;
  width:100%;
  margin-top:10px;
}
.status-wait{color:green;font-weight:bold;}
.status-run{color:red;font-weight:bold;}
</style>
</head>

<body>

<!-- ログイン -->
<div id="loginScreen" class="screen active">
  <h2>ログイン</h2>
  <button onclick="login()">ログイン</button>
</div>

<!-- 車両一覧 -->
<div id="vehicleScreen" class="screen">
  <h2>車両一覧</h2>
  <div id="vehicleList"></div>
</div>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbzMk6xlXfaA_ptN2VAmcY7T0k-CrCkUztaFP1pkqdy4tfh2945bZfFcf0caGkVRmKbkQA/exec";

let vehicles = [];

// =================
// ログイン
// =================
function login(){

  fetch(API_URL,{
    method:"POST",
    body:new URLSearchParams({action:"login"})
  })
  .then(res=>res.json())
  .then(data=>{
    if(data.success){
      showVehicles();
    }else{
      alert("ログイン失敗");
    }
  });

}

// =================
// 車両取得
// =================
function showVehicles(){

  fetch(API_URL,{
    method:"POST",
    body:new URLSearchParams({action:"getVehicles"})
  })
  .then(res=>res.json())
  .then(data=>{

    if(data.success){

      vehicles = data.vehicles;

      document.getElementById("loginScreen").classList.remove("active");
      document.getElementById("vehicleScreen").classList.add("active");

      renderVehicles();

    }else{
      alert("車両取得失敗");
    }

  });

}

// =================
// 描画
// =================
function renderVehicles(){

  const list = document.getElementById("vehicleList");
  list.innerHTML = "";

  vehicles.forEach(v=>{

    const div = document.createElement("div");
    div.className="card";

    if(v.status==="run"){
      div.innerHTML = `
        <h3>${v.name}</h3>
        <div class="status-run">●運行中（${v.driver}）</div>
        <button onclick="endRun('${v.name}')">到着</button>
      `;
    }else{
      div.innerHTML = `
        <h3>${v.name}</h3>
        <div class="status-wait">●待機中</div>
        <button onclick="startRun('${v.name}')">運行する</button>
      `;
    }

    list.appendChild(div);

  });

}

// =================
// 運行開始
// =================
function startRun(vehicleName){

  const driver = prompt("運転者名を入力してください");
  if(!driver) return;

  fetch(API_URL,{
    method:"POST",
    body:new URLSearchParams({
      action:"startRun",
      vehicle:vehicleName,
      driver:driver
    })
  })
  .then(res=>res.json())
  .then(data=>{
    if(data.success){
      showVehicles();
    }else{
      alert("開始失敗");
    }
  });

}

// =================
// 運行終了
// =================
function endRun(vehicleName){

  fetch(API_URL,{
    method:"POST",
    body:new URLSearchParams({
      action:"endRun",
      vehicle:vehicleName
    })
  })
  .then(res=>res.json())
  .then(data=>{
    if(data.success){
      showVehicles();
    }else{
      alert("終了失敗");
    }
  });

}

</script>

</body>
</html>

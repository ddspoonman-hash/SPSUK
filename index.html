<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>運行管理</title>
<style>
body{font-family:sans-serif;background:#f4f6f9;margin:0}
.header{background:#1e88e5;color:white;padding:15px;text-align:center}
.container{max-width:500px;margin:30px auto;padding:15px}
.card{background:white;padding:20px;border-radius:10px;margin-bottom:15px}
input{width:100%;padding:10px;margin-bottom:10px}
button{width:100%;padding:12px;font-weight:bold}
</style>
</head>
<body>

<div class="header">運行管理システム</div>

<div class="container">

<div id="loginScreen" class="card">
<h3>ログイン</h3>
<input id="userId" placeholder="ID">
<input id="password" type="password" placeholder="パスワード">
<button onclick="login()">ログイン</button>
</div>

<div id="mainScreen" style="display:none">
<div id="vehicleList"></div>
</div>

</div>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbzn-slpKhdxBZv1vvQyZBPRwMmg26XKN1ol32L78UjVF4HuyzU8znQLjRRhYCLC4E3zsw/exec";
let vehicles=[];

// =================
// ログイン保持チェック
// =================
window.onload=function(){
  const token = localStorage.getItem("token");
  const expires = localStorage.getItem("expires");

  if(token && Date.now() < expires){
    showMain();
  }
};

// =================
// ログイン
// =================
function login(){

  const id = document.getElementById("userId").value;
  const pw = document.getElementById("password").value;

  fetch(API_URL,{
    method:"POST",
    body:new URLSearchParams({
      action:"login",
      id:id,
      pw:pw
    })
  })
  .then(res=>res.json())
  .then(data=>{
    if(data.success){
      localStorage.setItem("token",data.token);
      localStorage.setItem("expires",data.expires);
      showMain();
    }else{
      alert("ログイン失敗");
    }
  });
}

// =================
// メイン表示
// =================
function showMain(){
  document.getElementById("loginScreen").style.display="none";
  document.getElementById("mainScreen").style.display="block";
  loadVehicles();
  setInterval(loadVehicles,5000);
}

// =================
// 車両取得
// =================
function loadVehicles(){

  fetch(API_URL,{
    method:"POST",
    body:new URLSearchParams({action:"getVehicles"})
  })
  .then(res=>res.json())
  .then(data=>{
    if(data.success){
      vehicles=data.vehicles;
      render();
    }
  });
}

// =================
// 描画
// =================
function render(){

  const list=document.getElementById("vehicleList");
  list.innerHTML="";

  vehicles.forEach(v=>{
    const div=document.createElement("div");
    div.className="card";

    if(v.status==="run"){
      div.innerHTML=`
        <h3>${v.name}</h3>
        <p>●運行中（${v.driver}）</p>
        <button onclick="endRun('${v.name}')">到着</button>
      `;
    }else{
      div.innerHTML=`
        <h3>${v.name}</h3>
        <p>●待機中</p>
        <button onclick="startRun('${v.name}')">運行する</button>
      `;
    }

    list.appendChild(div);
  });
}

// =================
// 運行開始
// =================
function startRun(vehicle){
  const driver=prompt("運転者名");
  if(!driver)return;

  fetch(API_URL,{
    method:"POST",
    body:new URLSearchParams({
      action:"startRun",
      vehicle:vehicle,
      driver:driver
    })
  }).then(()=>loadVehicles());
}

// =================
// 終了
// =================
function endRun(vehicle){
  fetch(API_URL,{
    method:"POST",
    body:new URLSearchParams({
      action:"endRun",
      vehicle:vehicle
    })
  }).then(()=>loadVehicles());
}

</script>
</body>
</html>

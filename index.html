<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>車両管理</title>

<style>

body{
font-family:sans-serif;
background:#f5f5f5;
margin:0;
padding:20px;
}

.card{
background:white;
padding:20px;
border-radius:12px;
margin-bottom:20px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

button{
width:100%;
padding:15px;
font-size:18px;
border:none;
border-radius:8px;
background:#1976d2;
color:white;
}

.status-wait{color:green;}
.status-run{color:red;}

input,select{
width:100%;
padding:12px;
margin-bottom:10px;
font-size:16px;
}

</style>

</head>
<body>

<div id="login">

<div class="card">

<h2>ログイン</h2>

<input id="id" placeholder="ID">
<input id="pw" type="password" placeholder="パスワード">

<button onclick="login()">ログイン</button>

</div>

</div>


<div id="main" style="display:none">

<h2>🚗 車両一覧</h2>

<button onclick="logout()">ログアウト</button>

<div id="vehicleList"></div>

</div>


<script>

const API="https://script.google.com/macros/s/AKfycbzn-slpKhdxBZv1vvQyZBPRwMmg26XKN1ol32L78UjVF4HuyzU8znQLjRRhYCLC4E3zsw/exec";

let vehicles=[];
let drivers=[];

window.onload=()=>{

const exp=localStorage.getItem("exp");

if(exp && Date.now()<exp){

showMain();
loadDrivers();
loadVehicles();

}

}

//ログイン
function login(){

fetch(API,{
method:"POST",
body:new URLSearchParams({
action:"login",
id:document.getElementById("id").value,
pw:document.getElementById("pw").value
})
})
.then(r=>r.json())
.then(d=>{

if(d.success){

localStorage.setItem("exp",d.expires);

showMain();

loadDrivers();
loadVehicles();

}else{

alert("ログイン失敗");

}

});

}

//ログアウト
function logout(){

localStorage.clear();
location.reload();

}

//メイン表示
function showMain(){

document.getElementById("login").style.display="none";
document.getElementById("main").style.display="block";

}

//ドライバー取得
function loadDrivers(){

fetch(API,{
method:"POST",
body:new URLSearchParams({action:"getDrivers"})
})
.then(r=>r.json())
.then(d=>{

drivers=d.list;

});

}

//車両取得
function loadVehicles(){

fetch(API,{
method:"POST",
body:new URLSearchParams({action:"getVehicles"})
})
.then(r=>r.json())
.then(d=>{

vehicles=d.vehicles;

render();

});

}

//表示
function render(){

const list=document.getElementById("vehicleList");

list.innerHTML="";

vehicles.forEach(v=>{

const div=document.createElement("div");

div.className="card";

if(v.status==="run"){

div.innerHTML=`
<h3>${v.name}</h3>
<div class="status-run">●運行中 (${v.driver})</div>
<button onclick="end('${v.name}')">到着</button>
`;

}else{

div.innerHTML=`
<h3>${v.name}</h3>
<div class="status-wait">●待機中</div>
<button onclick="start('${v.name}')">運行する</button>
`;

}

list.appendChild(div);

});

}

//出発
function start(vehicle){

let dept=prompt("所属 (営業/総務/管理)");

if(!dept)return;

let list=drivers.filter(d=>d.dept===dept).map(d=>d.name);

let driver=prompt("運転者\n"+list.join("\n"));

if(!driver)return;

fetch(API,{
method:"POST",
mode:"no-cors",
body:new URLSearchParams({
action:"login",
id:id,
pw:pw
})
})

//到着
function end(vehicle){

fetch(API,{
method:"POST",
body:new URLSearchParams({
action:"end",
vehicle:vehicle
})
})
.then(()=>loadVehicles());

}

</script>

</body>
</html>

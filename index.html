<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SPSUK 車両運行</title>
<style>
body{font-family:sans-serif;margin:0;background:#eaf4fb;}
header{background:#b3d9f7;padding:15px;text-align:center;font-size:20px;font-weight:bold;}
.container{padding:15px;}
select,input,button{width:100%;padding:12px;margin:5px 0;font-size:16px;}
button{background:#6bbcf5;border:none;color:white;font-weight:bold;border-radius:8px;}
.passenger-box{border:1px solid #ccc;background:white;padding:10px;margin-top:10px;max-height:180px;overflow:auto;}
label{display:block;margin:3px 0;}
</style>
</head>
<body>
<header>SPSUK 車両運行管理</header>
<div class="container">

<select id="vehicle"></select>
<select id="driver"></select>

<input type="number" id="startMeter" placeholder="出発メーター">
<input type="number" id="endMeter" placeholder="終了メーター">

<select id="groupSelect" onchange="renderPassengers()">
<option value="児童">児童</option>
<option value="就労">就労</option>
<option value="職員">職員</option>
</select>

<div class="passenger-box" id="passengerList"></div>

<button onclick="saveRecord()">保存</button>

</div>

<script>
const vehicles=["黒VOXY","銀VOXY","ノア","スペード","ミラ①","ミラ②","アイシス"];
let data=JSON.parse(localStorage.getItem("spsukData"))||{records:[],drivers:["田中","佐藤"],groups:{
"児童":["児童A","児童B"],
"就労":["就労A","就労B"],
"職員":["職員A"]
}};

const vehicleSelect=document.getElementById("vehicle");
vehicles.forEach(v=>vehicleSelect.innerHTML+=`<option>${v}</option>`);

const driverSelect=document.getElementById("driver");
data.drivers.forEach(d=>driverSelect.innerHTML+=`<option>${d}</option>`);

let selectedPassengers=[];

function renderPassengers(){
const group=document.getElementById("groupSelect").value;
const list=document.getElementById("passengerList");
list.innerHTML="";
data.groups[group].forEach(name=>{
const checked=selectedPassengers.includes(name)?"checked":"";
list.innerHTML+=`<label><input type="checkbox" value="${name}" ${checked}
onchange="togglePassenger(this)"> ${name}</label>`;
});
}

function togglePassenger(el){
if(el.checked){
if(selectedPassengers.length>=7){alert("最大7名");el.checked=false;return;}
selectedPassengers.push(el.value);
}else{
selectedPassengers=selectedPassengers.filter(n=>n!==el.value);
}
}

function saveRecord(){
const start=parseInt(document.getElementById("startMeter").value);
const end=parseInt(document.getElementById("endMeter").value);
if(isNaN(start)||isNaN(end)||end<start){alert("メーター確認");return;}

data.records.push({
date:new Date().toLocaleDateString(),
vehicle:vehicleSelect.value,
driver:driverSelect.value,
start:start,
end:end,
distance:end-start,
passengers:selectedPassengers.join(",")
});

  // Google送信
fetch("https://script.google.com/macros/s/AKfycbzWIZuiX_C5OWFJEmtYDp2Zs3mu4GhhmShPHRwKm8oLyI5CX0at6aDF_PAsX_7V3JY4eQ/exec",{
method:"POST",
body:JSON.stringify({
vehicle:vehicleSelect.value,
driver:driverSelect.value,
start:start,
end:end,
distance:end-start,
passengers:selectedPassengers.join(",")
})
});
localStorage.setItem("spsukData",JSON.stringify(data));
alert("保存完了");
document.getElementById("startMeter").value="";
document.getElementById("endMeter").value="";
selectedPassengers=[];
renderPassengers();
}

renderPassengers();
</script>
</body>
</html>

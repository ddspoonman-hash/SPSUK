<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>運行管理</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
  margin:0;
  background:#f4f6f9;
}
.header{
  background:#1e88e5;
  color:white;
  padding:15px;
  text-align:center;
  font-size:18px;
  font-weight:bold;
}
.container{
  max-width:600px;
  margin:20px auto;
  padding:10px;
}
.card{
  background:white;
  padding:18px;
  margin-bottom:15px;
  border-radius:12px;
  box-shadow:0 3px 10px rgba(0,0,0,0.08);
}
h3{margin:0 0 10px 0;}
.status{
  font-weight:bold;
  margin-bottom:10px;
}
.wait{color:#2e7d32;}
.run{color:#d32f2f;}
button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:8px;
  font-size:15px;
  font-weight:bold;
}
.btn-start{
  background:#1e88e5;
  color:white;
}
.btn-end{
  background:#d32f2f;
  color:white;
}
.footer{
  text-align:center;
  font-size:12px;
  color:#888;
  margin-top:20px;
}
</style>
</head>

<body>

<div class="header">運行管理システム</div>

<div class="container">
  <div id="vehicleList"></div>
  <div class="footer">自動更新中（5秒ごと）</div>
</div>

<script>

const API_URL = "ここにGASのURL";

let vehicles = [];

/* ========================
   初期ロード
======================== */
loadVehicles();
setInterval(loadVehicles,5000);

/* ========================
   車両取得
======================== */
function loadVehicles(){

  fetch(API_URL,{
    method:"POST",
    body:new URLSearchParams({action:"getVehicles"})
  })
  .then(res=>res.json())
  .then(data=>{
    if(data.success){
      vehicles = data.vehicles;
      render();
    }
  });
}

/* ========================
   描画
======================== */
function render(){

  const list = document.getElementById("vehicleList");
  list.innerHTML = "";

  vehicles.forEach(v=>{

    const div = document.createElement("div");
    div.className = "card";

    if(v.status==="run"){
      div.innerHTML = `
        <h3>${v.name}</h3>
        <div class="status run">●運行中（${v.driver}）</div>
        <button class="btn-end" onclick="endRun('${v.name}')">到着</button>
      `;
    }else{
      div.innerHTML = `
        <h3>${v.name}</h3>
        <div class="status wait">●待機中</div>
        <button class="btn-start" onclick="startRun('${v.name}')">運行する</button>
      `;
    }

    list.appendChild(div);
  });
}

/* ========================
   運行開始（即時反映）
======================== */
function startRun(vehicle){

  const driver = prompt("運転者名を入力");
  if(!driver) return;

  // ① 即画面変更（体感高速）
  const v = vehicles.find(v=>v.name===vehicle);
  v.status="run";
  v.driver=driver;
  render();

  // ② サーバー更新
  fetch(API_URL,{
    method:"POST",
    body:new URLSearchParams({
      action:"startRun",
      vehicle:vehicle,
      driver:driver
    })
  });
}

/* ========================
   運行終了
======================== */
function endRun(vehicle){

  const v = vehicles.find(v=>v.name===vehicle);
  v.status="wait";
  v.driver="";
  render();

  fetch(API_URL,{
    method:"POST",
    body:new URLSearchParams({
      action:"endRun",
      vehicle:vehicle
    })
  });
}

</script>

</body>
</html>

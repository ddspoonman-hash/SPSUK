<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>車両管理</title>

<style>

body{
font-family:sans-serif;
background:#f0f2f5;
margin:0;
padding:20px;
}

.card{
background:white;
padding:20px;
border-radius:12px;
margin-bottom:15px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

button{
width:100%;
padding:14px;
font-size:16px;
border:none;
border-radius:8px;
background:#1976d2;
color:white;
}

button:disabled{
background:#999;
}

input{
width:100%;
padding:12px;
margin-bottom:10px;
font-size:16px;
}

.status-wait{
color:green;
}

.status-run{
color:red;
}

</style>

</head>
<body>

<div id="loginPage">

<div class="card">

<h2>ログイン</h2>

<input id="id" placeholder="ID">
<input id="pw" type="password" placeholder="パスワード">

<button onclick="login()">ログイン</button>

</div>

</div>


<div id="mainPage" style="display:none">

<h2>🚗 車両一覧</h2>

<div id="vehicleList"></div>

</div>


<script>

const API="https://script.google.com/macros/s/AKfycbzn-slpKhdxBZv1vvQyZBPRwMmg26XKN1ol32L78UjVF4HuyzU8znQLjRRhYCLC4E3zsw/exec";

let vehicles=[];
let busy=false;


// 起動時

window.onload=()=>{

const token=localStorage.getItem("token");
const exp=localStorage.getItem("exp");

if(token && Date.now()<exp){

showMain();
loadVehicles();

}

};


// ログイン

function login(){

const id=document.getElementById("id").value;
const pw=document.getElementById("pw").value;

fetch(API,{
method:"POST",
body:new URLSearchParams({
action:"login",
id:id,
pw:pw
})
})
.then(r=>r.json())
.then(data=>{

if(data.success){

localStorage.setItem("token",data.token);
localStorage.setItem("exp",data.expires);

showMain();
loadVehicles();

}else{

alert("ログイン失敗");

}

});

}


// メイン画面

function showMain(){

document.getElementById("loginPage").style.display="none";
document.getElementById("mainPage").style.display="block";

}


// 車両取得

function loadVehicles(){

fetch(API,{
method:"POST",
body:new URLSearchParams({
action:"getVehicles"
})
})
.then(r=>r.json())
.then(data=>{

vehicles=data.vehicles;
render();

});

}


// 描画

function render(){

const list=document.getElementById("vehicleList");
list.innerHTML="";

vehicles.forEach(v=>{

const div=document.createElement("div");
div.className="card";

if(v.status==="run"){

div.innerHTML=`
<h3>${v.name}</h3>
<div class="status-run">●運行中 (${v.driver})</div>
<button onclick="endRun('${v.name}')">到着</button>
`;

}else{

div.innerHTML=`
<h3>${v.name}</h3>
<div class="status-wait">●待機中</div>
<button onclick="startRun('${v.name}')">運行する</button>
`;

}

list.appendChild(div);

});

}


// 運行開始

function startRun(vehicle){

if(busy)return;

const driver=prompt("運転者名");

if(!driver)return;

busy=true;

fetch(API,{
method:"POST",
body:new URLSearchParams({
action:"startRun",
vehicle:vehicle,
driver:driver
})
})
.then(r=>r.json())
.then(()=>{

busy=false;
loadVehicles();

});

}


// 到着

function endRun(vehicle){

if(busy)return;

busy=true;

fetch(API,{
method:"POST",
body:new URLSearchParams({
action:"endRun",
vehicle:vehicle
})
})
.then(r=>r.json())
.then(()=>{

busy=false;
loadVehicles();

});

}

</script>

</body>
</html>

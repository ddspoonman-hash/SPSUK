<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width,initial-scale=1">

<style>

body{
font-family:sans-serif;
background:#f4f4f4;
padding:20px;
}

.card{
background:white;
padding:18px;
border-radius:12px;
margin-bottom:15px;
box-shadow:0 3px 8px rgba(0,0,0,0.1);
}

button{
width:100%;
padding:14px;
font-size:16px;
border:none;
border-radius:8px;
background:#1976d2;
color:white;
}

.status-wait{color:green}
.status-run{color:red}

input,select{
width:100%;
padding:12px;
margin-bottom:10px;
}

</style>

</head>

<body>

<div id="login">

<div class="card">

<h2>SP車両運行管理</h2>

<input id="id" placeholder="ID">
<input id="pw" type="password" placeholder="PW">

<button onclick="login()">ログイン</button>

</div>

</div>

<div id="main" style="display:none">

<h2>車両一覧</h2>

<div id="list"></div>

</div>

<script>

const API="https://script.google.com/macros/s/AKfycby0mI6eAWwNHb6Ufo6bUpxH8_8CBrFEcMdYB_2C5p7qTGQSf06S7fR_iNWXizIl6399/exec";

let user="";
let vehicles=[];

function login(){

let id=document.getElementById("id").value
let pw=document.getElementById("pw").value

fetch(API+"?action=login&id="+id+"&pw="+pw)
.then(r=>r.json())
.then(d=>{

if(!d.success){

alert("ログイン失敗")
return

}

user=d.name

document.getElementById("login").style.display="none"
document.getElementById("main").style.display="block"

load()

})

}

function load(){

fetch(API+"?action=vehicles")
.then(r=>r.json())
.then(d=>{

vehicles=d.vehicles

render()

})

}

function render(){

const list=document.getElementById("list")

list.innerHTML=""

vehicles.forEach(v=>{

let div=document.createElement("div")
div.className="card"

if(v.status=="run"){

div.innerHTML=`
<h3>${v.name}</h3>
<div class="status-run">運行中 ${v.driver}</div>
<button onclick="arrive('${v.name}')">到着</button>
`

}else{

div.innerHTML=`
<h3>${v.name}</h3>
<div class="status-wait">待機中</div>
<button onclick="start('${v.name}')">出発</button>
`

}

list.appendChild(div)

})

}

function start(vehicle){

fetch(API+"?action=start&vehicle="+vehicle+"&driver="+user)
.then(()=>load())

}

function arrive(vehicle){

let destination=prompt("行き先")
let purpose=prompt("用件")
let passengers=prompt("同乗者")
let note=prompt("備考")

fetch(API+
"?action=end"+
"&vehicle="+vehicle+
"&driver="+user+
"&destination="+destination+
"&purpose="+purpose+
"&passengers="+passengers+
"&note="+note
)
.then(()=>load())

}

</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SPSUK</title>

<style>
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
  background:#f2f2f2;
}

.screen{
  display:none;
  padding:20px;
}

.active{
  display:block;
}

.card{
  background:white;
  padding:20px;
  border-radius:20px;
  margin-bottom:15px;
  box-shadow:0 5px 15px rgba(0,0,0,0.08);
}

button{
  width:100%;
  padding:18px;
  border:none;
  border-radius:15px;
  background:#007aff;
  color:white;
  font-size:18px;
  font-weight:bold;
}

input{
  width:100%;
  padding:15px;
  margin-bottom:15px;
  border-radius:12px;
  border:1px solid #ddd;
  font-size:16px;
  box-sizing:border-box;
}

.status-wait{ color:green; font-weight:bold;}
.status-run{ color:red; font-weight:bold;}

h2{ margin-top:0; }
</style>
</head>

<body>

<!-- ログイン画面 -->
<div id="loginScreen" class="screen active">

  <div class="card">
    <h2>ログイン</h2>
    <input type="text" id="loginId" placeholder="ID">
    <input type="password" id="loginPass" placeholder="パスワード">
    <button id="loginBtn">ログイン</button>
  </div>

</div>

<!-- 車両一覧画面 -->
<div id="vehicleScreen" class="screen">

  <h2>🚗 車両一覧</h2>
  <div id="vehicleList"></div>

</div>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbxWrLv8mDf31ia6zO-OSTO8pIYZJkZbj03cRjLW-q8YFb_-ZljWJYwGqnSgHCUVfYgQGQ/exec";

/* 仮データ（あとでGAS連携） */
let vehicles = [];

/* ログイン */
document.getElementById("loginBtn").addEventListener("click", login);

function login(){

  const btn = document.getElementById("loginBtn");
  btn.disabled = true;
  btn.innerText = "ログイン中...";

  const id = document.getElementById("loginId").value;
  const pass = document.getElementById("loginPass").value;

  const formData = new URLSearchParams();
  formData.append("action","login");
  formData.append("id",id);
  formData.append("pass",pass);

  fetch(API_URL,{
    method:"POST",
    body:formData
  })
  .then(res => res.json())
  .then(data => {

  console.log(data);

  btn.disabled = false;
  btn.innerText = "ログイン";

  if(data.success === true){
    showVehicles();
  }else{
    alert("ログイン失敗");
  }

})
  .catch(()=>{
    btn.disabled = false;
    btn.innerText = "ログイン";
    alert("通信エラー");
  });

}

/* 画面切り替え */
function showVehicles(){

  fetch(API_URL,{
    method:"POST",
    body:new URLSearchParams({action:"getVehicles"})
  })
  .then(res=>res.json())
  .then(data=>{

    if(data.success){

      vehicles = data.vehicles;

      document.getElementById("loginScreen").classList.remove("active");
      document.getElementById("vehicleScreen").classList.add("active");

      renderVehicles();

    }else{
      alert("車両取得失敗");
    }

  })
  .catch(()=>{
    alert("通信エラー");
  });

}

/* 車両描画 */
function renderVehicles(){

  const list = document.getElementById("vehicleList");
  list.innerHTML = "";

  vehicles.forEach(v=>{

    const div = document.createElement("div");
    div.className = "card";

    if(v.status==="wait"){
      div.innerHTML = `
        <h3>${v.name}</h3>
        <div class="status-wait">●待機中</div>
        <button onclick="selectVehicle('${v.name}')">運行する</button>
      `;
    }else{
      div.innerHTML = `
        <h3>${v.name}</h3>
        <div class="status-run">●運行中（${v.driver}）</div>
        <button disabled>運行中</button>
      `;
    }

    list.appendChild(div);
  });

}

function selectVehicle(name){
  alert(name + " を選択しました（次で出発画面作ります）");
}

</script>

</body>
</html>

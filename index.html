<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>運行管理</title>

<style>
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,sans-serif;
  background:#f2f2f7;
}

.container{
  max-width:420px;
  margin:0 auto;
  padding:20px;
}

.card{
  background:white;
  padding:20px;
  border-radius:16px;
  box-shadow:0 6px 20px rgba(0,0,0,0.08);
}

h2{
  text-align:center;
  margin-bottom:20px;
}

input{
  width:100%;
  padding:16px;
  margin-bottom:15px;
  font-size:16px;
  border-radius:10px;
  border:1px solid #ccc;
  box-sizing:border-box;
}

button{
  width:100%;
  padding:16px;
  font-size:18px;
  background:#007aff;
  color:white;
  border:none;
  border-radius:12px;
}

button:active{
  opacity:0.8;
}
</style>
</head>

<body>

<div class="container">
  <div class="card">
    <h2>ログイン</h2>
    <input id="loginId" placeholder="ID">
    <input id="loginPass" type="password" placeholder="パスワード">
    <button onclick="login()">ログイン</button>
  </div>
</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbzqlyQIaksGLgOOxwktsqKZL6dkQbrPHAcWW8gP8kF2ahin_wNcorYAs99du1BtjhRXDA/exec";

async function login(){
  alert("ボタンは押されている");
}

  const formData = new URLSearchParams();
  formData.append("action","login");
  formData.append("id",id);
  formData.append("pass",pass);

  const res = await fetch(API_URL,{
    method:"POST",
    body:formData
  });

  const data = await res.json();

  if(data.success){
    alert("ログイン成功");
  }else{
    alert("ログイン失敗");
  }
}
</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>車両管理</title>

<style>

body{
font-family:sans-serif;
background:#f5f5f5;
margin:0;
padding:20px;
}

.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
}

.logout{
background:#e53935;
padding:8px 14px;
font-size:14px;
border-radius:6px;
width:auto;
}

.card{
background:white;
padding:20px;
border-radius:12px;
margin-bottom:20px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

button{
width:100%;
padding:15px;
font-size:16px;
border:none;
border-radius:8px;
background:#1976d2;
color:white;
}

input,select{
width:100%;
padding:12px;
margin-bottom:10px;
font-size:16px;
}

.status-wait{color:green;}
.status-run{color:red;}

</style>
</head>
<body>

<!-- ログイン画面 -->
<div id="loginPage">

<div class="card">
<h2>ログイン</h2>

<input id="id" placeholder="ID">
<input id="pw" type="password" placeholder="パスワード">

<button onclick="login()">ログイン</button>

</div>

</div>


<!-- メイン画面 -->
<div id="mainPage" style="display:none">

<div class="header">
<h2>🚗 車両一覧</h2>
<button class="logout" onclick="logout()">ログアウト</button>
</div>

<div id="vehicleList"></div>

</div>


<script>

const API="https://script.google.com/macros/s/AKfycbzn-slpKhdxBZv1vvQyZBPRwMmg26XKN1ol32L78UjVF4HuyzU8znQLjRRhYCLC4E3zsw/exec";

let vehicles=[];
let loading=false;

window.onload=()=>{

const token=localStorage.getItem("token");
const exp=localStorage.getItem("expires");

if(token && Date.now()<exp){

showMain();
loadVehicles();

}

}

function login(){

const id=document.getElementById("id").value;
const pw=document.getElementById("pw").value;

fetch(API+"?action=login&id="+id+"&pw="+pw)
.then(r=>r.json())
.then(data=>{

if(data.success){

localStorage.setItem("token",data.token);
localStorage.setItem("expires",data.expires);

showMain();
loadVehicles();

}else{

alert("ログイン失敗");

}

});

}

function logout(){

localStorage.clear();
location.reload();

}

function showMain(){

document.getElementById("loginPage").style.display="none";
document.getElementById("mainPage").style.display="block";

}

function loadVehicles(){

fetch(API+"?action=getVehicles")
.then(r=>r.json())
.then(data=>{

vehicles=data.vehicles;
renderVehicles();

});

}

function renderVehicles(){

const list=document.getElementById("vehicleList");
list.innerHTML="";

vehicles.forEach(v=>{

const div=document.createElement("div");
div.className="card";

if(v.status==="run"){

div.innerHTML=`
<h3>${v.name}</h3>
<div class="status-run">●運行中 (${v.driver})</div>
<button onclick="endRun('${v.name}')">到着</button>
`;

}else{

div.innerHTML=`
<h3>${v.name}</h3>
<div class="status-wait">●待機中</div>
<button onclick="startRun('${v.name}')">運行する</button>
`;

}

list.appendChild(div);

});

}

function startRun(vehicle){

if(loading)return;

const driver=prompt("運転者名");
const passenger=prompt("同乗者");
const destination=prompt("行き先");
const purpose=prompt("用件");

if(!driver)return;

loading=true;

fetch(API+
"?action=startRun"+
"&vehicle="+vehicle+
"&driver="+driver+
"&passenger="+passenger+
"&destination="+destination+
"&purpose="+purpose)
.then(r=>r.json())
.then(()=>{

loading=false;
loadVehicles();

});

}

function endRun(vehicle){

if(loading)return;

loading=true;

fetch(API+"?action=endRun&vehicle="+vehicle)
.then(r=>r.json())
.then(()=>{

loading=false;
loadVehicles();

});

}

</script>

</body>
</html>

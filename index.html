<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SPSUK</title>

<style>
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
  background:#f2f2f2;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.container{
  background:white;
  padding:30px;
  border-radius:20px;
  width:90%;
  max-width:400px;
  box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

h2{
  text-align:center;
  margin-bottom:20px;
}

input{
  width:100%;
  padding:15px;
  margin-bottom:15px;
  border-radius:12px;
  border:1px solid #ddd;
  font-size:16px;
  box-sizing:border-box;
}

button{
  width:100%;
  padding:15px;
  border:none;
  border-radius:12px;
  background:#007aff;
  color:white;
  font-size:18px;
  font-weight:bold;
  cursor:pointer;
}

button:disabled{
  background:#999;
}

.footer{
  text-align:center;
  margin-top:15px;
  font-size:12px;
  color:#888;
}
</style>
</head>

<body>

<div class="container">
  <h2>ログイン</h2>

  <input type="text" id="loginId" placeholder="ID">
  <input type="password" id="loginPass" placeholder="パスワード">

  <button id="loginBtn">ログイン</button>

  <div class="footer">SPSUK System</div>
</div>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbzqlyQIaksGLgOOxwktsqKZL6dkQbrPHAcWW8gP8kF2ahin_wNcorYAs99du1BtjhRXDA/exec";

document.getElementById("loginBtn").addEventListener("click", login);

function login(){

  const btn = document.getElementById("loginBtn");
  btn.disabled = true;
  btn.innerText = "ログイン中...";

  const id = document.getElementById("loginId").value;
  const pass = document.getElementById("loginPass").value;

  const formData = new URLSearchParams();
  formData.append("action","login");
  formData.append("id",id);
  formData.append("pass",pass);

  fetch(API_URL,{
    method:"POST",
    body:formData
  })
  .then(res => res.json())
  .then(data => {

    btn.disabled = false;
    btn.innerText = "ログイン";

    if(data.success){
      alert("ログイン成功");
    }else{
      alert("ログイン失敗");
    }

  })
  .catch(err=>{
    btn.disabled = false;
    btn.innerText = "ログイン";
    alert("通信エラー");
    console.error(err);
  });

}

</script>

</body>
</html>

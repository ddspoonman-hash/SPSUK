<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width,initial-scale=1">

<style>

body{
font-family:sans-serif;
background:#f2f2f2;
margin:0;
padding:20px;
}

.card{
background:white;
padding:20px;
border-radius:12px;
margin-bottom:15px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

button{
width:100%;
padding:14px;
font-size:16px;
border:none;
border-radius:8px;
background:#1976d2;
color:white;
}

.small{
width:auto;
padding:8px 12px;
font-size:12px;
}

.status-wait{
color:green;
}

.status-run{
color:red;
}

input,select{
width:100%;
padding:12px;
margin-bottom:10px;
}

</style>

</head>

<body>

<div id="loginPage">

<div class="card">

<h2>SP車両運行管理</h2>

<input id="id" placeholder="ID">
<input id="pw" type="password" placeholder="PW">

<button onclick="login()">ログイン</button>

</div>

</div>

<div id="mainPage" style="display:none">

<button class="small" onclick="logout()">ログアウト</button>

<h2>車両一覧</h2>

<div id="vehicleList"></div>

</div>

<script>

const API="https://script.google.com/macros/s/AKfycby0mI6eAWwNHb6Ufo6bUpxH8_8CBrFEcMdYB_2C5p7qTGQSf06S7fR_iNWXizIl6399/exec";

let user="";
let vehicles=[];

function login(){

const id=document.getElementById("id").value;
const pw=document.getElementById("pw").value;

fetch(API+"?action=login&id="+id+"&pw="+pw)
.then(r=>r.json())
.then(d=>{

if(d.success){

user=d.name;

document.getElementById("loginPage").style.display="none";
document.getElementById("mainPage").style.display="block";

loadVehicles();

}else{

alert("ログイン失敗");

}

});

}

function logout(){

location.reload();

}

function loadVehicles(){

fetch(API+"?action=vehicles")
.then(r=>r.json())
.then(d=>{

vehicles=d.vehicles;

render();

});

}

function render(){

const list=document.getElementById("vehicleList");

list.innerHTML="";

vehicles.forEach(v=>{

let div=document.createElement("div");
div.className="card";

if(v.status=="run"){

div.innerHTML=`
<h3>${v.name}</h3>
<div class="status-run">運行中 (${v.driver})</div>
<button onclick="end('${v.name}')">到着</button>
`;

}else{

div.innerHTML=`
<h3>${v.name}</h3>
<div class="status-wait">待機中</div>
<button onclick="start('${v.name}')">出発</button>
`;

}

list.appendChild(div);

});

}

function start(vehicle){

fetch(API+"?action=start&vehicle="+vehicle+"&driver="+user)
.then(()=>loadVehicles());

}

function end(vehicle){

let destination=prompt("行き先");
let purpose=prompt("用件");
let passengers=prompt("同乗者");
let note=prompt("備考");

fetch(API+
"?action=end"+
"&vehicle="+vehicle+
"&driver="+user+
"&destination="+destination+
"&purpose="+purpose+
"&passengers="+passengers+
"&note="+note
)
.then(()=>loadVehicles());

}

</script>

</body>
</html>

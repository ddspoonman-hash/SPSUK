<!DOCTYPE html>
<html>
<body>

<h2>管理画面</h2>

<button onclick="showTab('dest')">行先管理</button>
<button onclick="showTab('pass')">同乗者管理</button>
<button onclick="showTab('data')">記録一覧</button>
<button onclick="showTab('csv')">CSV出力</button>

<div id="dest" style="display:none;">
<h3>行先追加</h3>
<input id="newDest">
<button onclick="addDest()">追加</button>
<div id="destList"></div>
</div>

<div id="pass" style="display:none;">
<h3>同乗者追加</h3>
区分:<input id="group">
名前:<input id="name">
<button onclick="addPass()">追加</button>
</div>

<div id="data" style="display:none;">
<button onclick="loadData()">表示</button>
<div id="result"></div>
</div>

<div id="csv" style="display:none;">
月(例:2026-02):
<input id="month">
<button onclick="csv()">出力</button>
<textarea id="csvArea" style="width:100%;height:200px;"></textarea>
</div>

<script>
function showTab(id){
["dest","pass","data","csv"].forEach(t=>{
document.getElementById(t).style.display="none";
});
document.getElementById(id).style.display="block";
}

function addDest(){
let v=document.getElementById("newDest").value;
google.script.run.addDestination(v);
alert("追加");
}

function addPass(){
google.script.run.addPassenger(
document.getElementById("group").value,
document.getElementById("name").value
);
alert("追加");
}

function loadData(){
google.script.run.withSuccessHandler(d=>{
let html="<table border=1>";
d.forEach((r,i)=>{
html+="<tr>";
r.forEach(c=>html+="<td>"+c+"</td>");
html+=`<td><button onclick="del(${i+1})">削除</button></td></tr>`;
});
html+="</table>";
document.getElementById("result").innerHTML=html;
}).getRecords();
}

function del(row){
google.script.run.deleteRecord(row);
alert("削除");
}

function csv(){
google.script.run.withSuccessHandler(c=>{
document.getElementById("csvArea").value=c;
}).exportCSV(document.getElementById("month").value);
}
</script>

</body>
</html>
